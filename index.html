<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Påskpång</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a0f2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    font-family: 'Inter', system-ui, sans-serif;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
  }

  #game-wrapper {
    position: relative;
    width: min(95vw, 800px);
    aspect-ratio: 4/3;
  }

  canvas {
    width: 100%;
    height: 100%;
    border-radius: 16px;
    display: block;
  }

  #start-screen, #game-over-screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(26, 15, 46, 0.94);
    border-radius: 16px;
    z-index: 10;
    gap: 18px;
    padding: 30px;
    text-align: center;
  }

  #game-over-screen { display: none; }

  .title {
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 900;
    background: linear-gradient(135deg, #FFD700, #FF6B35);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
  }

  .subtitle {
    font-size: clamp(13px, 2.2vw, 18px);
    color: #b8a9d4;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .matchup {
    display: flex;
    align-items: center;
    gap: 24px;
    margin: 10px 0;
  }

  .team {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .team-icon {
    width: 64px;
    height: 64px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
  }

  .team-name {
    font-size: 13px;
    font-weight: 700;
    color: #faf9f6;
  }

  .vs {
    font-size: 24px;
    font-weight: 900;
    color: #e85a1c;
  }

  .btn {
    padding: 14px 44px;
    border: none;
    border-radius: 12px;
    font-family: inherit;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 0.5px;
  }

  .btn:hover { transform: scale(1.04); }
  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: linear-gradient(135deg, #FF6B35, #FFD700);
    color: #1a0f2e;
    box-shadow: 0 4px 20px rgba(255, 107, 53, 0.4);
  }

  .btn-orange {
    background: linear-gradient(135deg, #FFD700, #FF6B35);
    color: #1a0f2e;
    box-shadow: 0 4px 20px rgba(255, 215, 0, 0.4);
  }

  .controls-hint {
    font-size: 12px;
    color: #5a5a5a;
    margin-top: 2px;
  }

  #score-display {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    display: none;
    align-items: center;
    gap: 16px;
    z-index: 5;
    background: rgba(26, 15, 46, 0.7);
    padding: 6px 20px;
    border-radius: 10px;
    backdrop-filter: blur(6px);
  }

  .score-team {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .score-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .score-num {
    font-size: 26px;
    font-weight: 900;
    min-width: 26px;
    text-align: center;
  }

  .score-divider {
    width: 2px;
    height: 28px;
    background: rgba(250, 249, 246, 0.12);
    border-radius: 1px;
  }

  .result-text {
    font-size: clamp(20px, 4vw, 36px);
    font-weight: 900;
    color: #faf9f6;
  }

  .result-score {
    font-size: clamp(36px, 6vw, 60px);
    font-weight: 900;
  }

  .result-flavor {
    font-size: 14px;
    color: #b8a9d4;
    font-weight: 600;
    max-width: 300px;
  }
</style>
</head>
<body>

<div id="game-wrapper">
  <canvas id="game"></canvas>

  <div id="score-display">
    <div class="score-team">
      <span class="score-label" style="color: #FF6B35;">🏋️ Flyttgubbarna</span>
      <span class="score-num" id="score-left" style="color: #FF6B35;">0</span>
    </div>
    <div class="score-divider"></div>
    <div class="score-team">
      <span class="score-num" id="score-right" style="color: #FFD700;">0</span>
      <span class="score-label" style="color: #FFD700;">🐣 Kycklingarna</span>
    </div>
  </div>

  <div id="start-screen">
    <div class="title">🐣 Påskpång 🥚</div>
    <div class="subtitle">Flyttgubbarna vs Kycklingarna</div>
    <div class="matchup">
      <div class="team">
        <div class="team-icon" style="background: linear-gradient(135deg, #FF6B35, #e85a1c);">
          <span>🏋️</span>
        </div>
        <span class="team-name">Flyttgubbarna</span>
      </div>
      <span class="vs">VS</span>
      <div class="team">
        <div class="team-icon" style="background: linear-gradient(135deg, #FFD700, #FFA500);">
          <span>🐣</span>
        </div>
        <span class="team-name">Kycklingarna</span>
      </div>
    </div>
    <button class="btn btn-primary" onclick="startGame()">🥚 Kor igang!</button>
    <div class="controls-hint">⬆️⬇️ Piltangenter</div>
  </div>

  <div id="game-over-screen">
    <div class="result-text" id="result-text"></div>
    <div class="result-score" id="result-score"></div>
    <div class="result-flavor" id="result-flavor"></div>
    <button class="btn btn-orange" onclick="startGame()">Spela igen</button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Påsk-tema farger
const C = {
  bg: '#1a0f2e',
  gridLine: 'rgba(255, 215, 0, 0.06)',
  centerLine: 'rgba(255, 215, 0, 0.15)',
  teal: '#FF6B35',       // Flyttgubbarna (vanster)
  tealGlow: 'rgba(255, 107, 53, 0.3)',
  tealDark: '#cc4400',
  orange: '#FFD700',      // Kycklingarna (hoger)
  orangeGlow: 'rgba(255, 215, 0, 0.3)',
  white: '#faf9f6',
  bronze: '#b8a9d4',
  primary: '#2d1b4e',
  primaryLight: '#4a2d7a',
  green: '#7CB342',
};

// --- EASIER SETTINGS ---
const WIN_SCORE = 5;
const BALL_SPEED_INIT = 5;
const BALL_SPEED_MAX = 10;
const BALL_SPEED_INCREASE = 0.2;
const AI_BASE_SPEED = 2.8;
const AI_REACTION_DELAY = 0.55; // lower = dumber
const PADDLE_W = 16;
const PADDLE_H = 110; // bigger paddle = easier

let W = 800, H = 600;
let scale = 1;
let gameRunning = false;
let animId;
let rallyCount = 0;
let comboText = '';
let comboTimer = 0;
let quoteText = '';
let quoteName = '';

// Citat fran ganget

  { name: 'Glammy', quote: 'Den returen var lika snygg som jag!' },
  { name: 'Glammy', quote: 'Glamorost mal, glamoros retur!' },
  { name: 'Mercan', quote: 'Den studsen var hardare an mina beats!' },
  { name: 'Mercan', quote: 'Kartongen bouncar som min musik!' },
  { name: 'Brottarludwig', quote: 'Jag brottade ner den kartongen!' },
  { name: 'Brottarludwig', quote: 'Suplex pa den returen!' },
  { name: 'Stajna', quote: 'Stansen ar starkare an nagonsin!' },
  { name: 'Stajna', quote: 'Ingen stannar Stajna!' },
];

let player, ai, ball;
let particles = [];
let trails = [];
let floatingItems = [];
let screenShake = { x: 0, y: 0, intensity: 0 };
let lastHitSide = null;

// Floating background items (pask-tema)
const FLOAT_EMOJIS = ['🥚', '🐣', '🐔', '🌷', '🐰', '🌸', '🪺', '🐥', '🌼', '📦'];

function initFloatingItems() {
  floatingItems = [];
  for (let i = 0; i < 12; i++) {
    floatingItems.push({
      emoji: FLOAT_EMOJIS[Math.floor(Math.random() * FLOAT_EMOJIS.length)],
      x: Math.random() * W,
      y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      size: 16 + Math.random() * 10,
      opacity: 0.06 + Math.random() * 0.06,
      rotation: Math.random() * 360,
      rotSpeed: (Math.random() - 0.5) * 0.5,
    });
  }
}

function resize() {
  const wrapper = document.getElementById('game-wrapper');
  const rect = wrapper.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  scale = rect.width / W;
}

function initObjects() {
  player = { x: 30, y: H / 2 - PADDLE_H / 2, w: PADDLE_W, h: PADDLE_H, score: 0 };
  ai = { x: W - 30 - PADDLE_W, y: H / 2 - PADDLE_H / 2, w: PADDLE_W, h: PADDLE_H, score: 0 };
  resetBall();
  particles = [];
  trails = [];
  rallyCount = 0;
  comboText = '';
  comboTimer = 0;
  initFloatingItems();
}

function resetBall(dir) {
  const angle = (Math.random() * 0.6 - 0.3); // narrower angle = more predictable
  const d = dir || (Math.random() > 0.5 ? 1 : -1);
  ball = {
    x: W / 2,
    y: H / 2,
    r: 18,
    vx: Math.cos(angle) * BALL_SPEED_INIT * d,
    vy: Math.sin(angle) * BALL_SPEED_INIT,
    speed: BALL_SPEED_INIT,
    rotation: 0,
  };
  lastHitSide = null;
  rallyCount = 0;
}

// Particles
function spawnHitParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3.5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.018 + Math.random() * 0.022,
      size: 2 + Math.random() * 4,
      color,
      type: 'circle',
    });
  }
}

function spawnScoreExplosion(x, y, color) {
  // Big burst
  for (let i = 0; i < 25; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.008 + Math.random() * 0.015,
      size: 3 + Math.random() * 7,
      color,
      type: 'circle',
    });
  }
  // Emoji confetti
  const scoreEmojis = ['🥚', '🐣', '🐔', '🌷', '🎉'];
  for (let i = 0; i < 6; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.5 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1.5,
      life: 1,
      decay: 0.008 + Math.random() * 0.008,
      size: 16 + Math.random() * 8,
      emoji: scoreEmojis[Math.floor(Math.random() * scoreEmojis.length)],
      type: 'emoji',
      gravity: 0.06,
    });
  }
}

// --- CHIPTUNE AUDIO ---
let audioCtx = null;
let musicPlaying = false;
let musicTimeout = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playNote(freq, duration, time, vol = 0.08, type = 'square') {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, time);
  gain.gain.exponentialRampToValueAtTime(0.001, time + duration * 0.9);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(time);
  osc.stop(time + duration);
}

// Upbeat pask-polka chiptune
// Each entry: [freq, duration_multiplier] (0 = rest)
const MELODY = [
  // Phrase 1 - bouncy intro
  [659,1],[784,1],[880,1],[784,1],  // E5 G5 A5 G5
  [659,2],[523,1],[587,1],          // E5-- C5 D5
  [659,1],[784,1],[880,1],[1047,1], // E5 G5 A5 C6
  [880,2],[784,1],[0,1],            // A5-- G5 -

  // Phrase 2 - call and response
  [1047,1],[988,1],[880,1],[784,1], // C6 B5 A5 G5
  [659,2],[587,1],[659,1],          // E5-- D5 E5
  [784,1],[659,1],[587,1],[523,1],  // G5 E5 D5 C5
  [587,2],[659,1],[0,1],            // D5-- E5 -

  // Phrase 3 - high energy
  [880,1],[880,0.5],[784,0.5],[880,1],[1047,1], // A5 A5.G5.A5 C6
  [1175,2],[1047,1],[880,1],        // D6-- C6 A5
  [784,1],[784,0.5],[659,0.5],[784,1],[880,1],  // G5 G5.E5.G5 A5
  [784,2],[659,1],[0,1],            // G5-- E5 -

  // Phrase 4 - finale
  [523,1],[659,1],[784,1],[880,1],  // C5 E5 G5 A5
  [1047,1],[880,1],[784,2],         // C6 A5 G5--
  [659,1],[784,1],[880,1],[784,1],  // E5 G5 A5 G5
  [659,2],[0,1],[0,1],              // E5-- - -
];

const BASS = [
  // Phrase 1
  [262,2],[0,1],[262,1],  [196,2],[0,1],[196,1],
  [262,2],[0,1],[262,1],  [220,2],[0,1],[220,1],
  // Phrase 2
  [262,2],[0,1],[262,1],  [196,2],[0,1],[196,1],
  [220,2],[0,1],[220,1],  [196,2],[0,1],[196,1],
  // Phrase 3
  [220,2],[0,1],[220,1],  [294,2],[0,1],[294,1],
  [196,2],[0,1],[196,1],  [262,2],[0,1],[262,1],
  // Phrase 4
  [262,2],[0,1],[262,1],  [220,2],[262,1],[196,1],
  [262,2],[0,1],[262,1],  [196,2],[0,1],[0,1],
];

function playMusic() {
  if (!audioCtx || !musicPlaying) return;
  const now = audioCtx.currentTime;
  const beat = 0.14; // seconds per beat - snappy

  // Play melody
  let t = now;
  for (let i = 0; i < MELODY.length; i++) {
    const [freq, dur] = MELODY[i];
    const noteDur = beat * dur;
    if (freq > 0) {
      playNote(freq, noteDur * 0.85, t, 0.07, 'square');
      // Add shimmer on high notes
      if (freq >= 880) playNote(freq * 2, noteDur * 0.3, t, 0.015, 'sine');
    }
    t += noteDur;
  }
  const melodyLen = t - now;

  // Play bass
  t = now;
  for (let i = 0; i < BASS.length; i++) {
    const [freq, dur] = BASS[i];
    const noteDur = beat * dur;
    if (freq > 0) {
      playNote(freq, noteDur * 0.9, t, 0.05, 'triangle');
    }
    t += noteDur;
  }

  // Drums - kick and hihat pattern
  const totalBeats = Math.round(melodyLen / beat);
  for (let i = 0; i < totalBeats; i++) {
    const dt = now + i * beat;
    if (i % 4 === 0) {
      playNote(65, 0.08, dt, 0.07, 'sine');       // kick
    } else if (i % 4 === 2) {
      playNote(65, 0.06, dt, 0.04, 'sine');        // soft kick
    }
    if (i % 2 === 1) {
      playNote(800, 0.02, dt, 0.02, 'sawtooth');   // hihat
    }
    // Snare-ish on 2 and 4
    if (i % 8 === 3 || i % 8 === 7) {
      playNote(180, 0.04, dt, 0.04, 'square');
      playNote(350, 0.03, dt, 0.025, 'sawtooth');
    }
  }

  // Arp accent every 8 beats
  for (let i = 0; i < totalBeats; i += 8) {
    const dt = now + i * beat;
    playNote(1318, 0.03, dt, 0.02, 'square');
    playNote(1568, 0.03, dt + 0.04, 0.015, 'square');
    playNote(1760, 0.03, dt + 0.08, 0.01, 'square');
  }

  // Loop
  musicTimeout = setTimeout(() => {
    if (musicPlaying) playMusic();
  }, melodyLen * 1000 - 50);
}

function startMusic() {
  initAudio();
  musicPlaying = true;
  playMusic();
}

function stopMusic() {
  musicPlaying = false;
  if (musicTimeout) {
    clearTimeout(musicTimeout);
    musicTimeout = null;
  }
}

// Sound effects
function sfxHit(pitch = 1) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  playNote(440 * pitch, 0.08, t, 0.12, 'square');
  playNote(660 * pitch, 0.06, t + 0.02, 0.08, 'square');
}

function sfxScore() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  playNote(523, 0.1, t, 0.1, 'square');
  playNote(659, 0.1, t + 0.1, 0.1, 'square');
  playNote(784, 0.15, t + 0.2, 0.1, 'square');
}

function sfxBounce() {
  if (!audioCtx) return;
  playNote(220, 0.05, audioCtx.currentTime, 0.06, 'triangle');
}

function sfxGameOver(won) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  if (won) {
    playNote(523, 0.15, t, 0.1, 'square');
    playNote(659, 0.15, t + 0.15, 0.1, 'square');
    playNote(784, 0.15, t + 0.3, 0.1, 'square');
    playNote(1047, 0.3, t + 0.45, 0.12, 'square');
  } else {
    playNote(392, 0.2, t, 0.1, 'square');
    playNote(330, 0.2, t + 0.2, 0.1, 'square');
    playNote(294, 0.2, t + 0.4, 0.1, 'square');
    playNote(262, 0.4, t + 0.6, 0.08, 'sawtooth');
  }
}

// Input
let keys = {};

document.addEventListener('keydown', e => { keys[e.key] = true; });
document.addEventListener('keyup', e => { keys[e.key] = false; });


// --- UPDATE ---
function update() {
  // Player movement - arrow keys only
  const pSpeed = 8;
  if (keys['ArrowUp'] || keys['w']) player.y -= pSpeed;
  if (keys['ArrowDown'] || keys['s']) player.y += pSpeed;
  player.y = Math.max(0, Math.min(H - player.h, player.y));

  // AI movement - intentionally beatable
  const aiTarget = ball.y - ai.h / 2;
  // AI only reacts when ball is heading toward it, and with delay
  let aiSpeed = AI_BASE_SPEED;
  if (ball.vx < 0) {
    // Ball going away - AI drifts slowly toward center
    const centerDiff = (H / 2 - ai.h / 2) - ai.y;
    ai.y += Math.sign(centerDiff) * Math.min(Math.abs(centerDiff), 1);
  } else {
    // Ball coming - react but with imperfection
    const imperfection = Math.sin(Date.now() * 0.003) * 15; // wobble
    const adjustedTarget = aiTarget + imperfection;
    const adjustedDiff = adjustedTarget - ai.y;
    if (Math.abs(adjustedDiff) > 8) {
      ai.y += Math.sign(adjustedDiff) * Math.min(Math.abs(adjustedDiff) * AI_REACTION_DELAY, aiSpeed);
    }
  }
  ai.y = Math.max(0, Math.min(H - ai.h, ai.y));

  // Ball trail
  if (ball.speed > 4) {
    trails.push({ x: ball.x, y: ball.y, life: 1 });
  }

  // Ball movement
  ball.x += ball.vx;
  ball.y += ball.vy;
  ball.rotation += ball.speed * 2;

  // Top/bottom bounce
  if (ball.y - ball.r <= 0) {
    ball.y = ball.r;
    ball.vy = Math.abs(ball.vy);
    spawnHitParticles(ball.x, ball.y, C.bronze, 4);
    sfxBounce();
  }
  if (ball.y + ball.r >= H) {
    ball.y = H - ball.r;
    ball.vy = -Math.abs(ball.vy);
    spawnHitParticles(ball.x, ball.y, C.bronze, 4);
    sfxBounce();
  }

  // Player paddle collision
  if (ball.vx < 0 && ball.x - ball.r <= player.x + player.w && ball.x + ball.r >= player.x &&
      ball.y >= player.y - 4 && ball.y <= player.y + player.h + 4 && lastHitSide !== 'player') {
    lastHitSide = 'player';
    rallyCount++;
    const hitPos = (ball.y - player.y) / player.h - 0.5;
    ball.speed = Math.min(ball.speed + BALL_SPEED_INCREASE, BALL_SPEED_MAX);
    const angle = hitPos * 1.0; // less extreme angles
    ball.vx = Math.cos(angle) * ball.speed;
    ball.vy = Math.sin(angle) * ball.speed;
    ball.x = player.x + player.w + ball.r;
    spawnHitParticles(ball.x, ball.y, C.teal, 10);
    sfxHit(1);
    screenShake.intensity = 3;
    if (rallyCount >= 3) {
      comboText = rallyCount >= 5 ? 'Rally x' + rallyCount + '!' : 'Bra retur!';
      comboTimer = rallyCount >= 5 ? 90 : 60;
      const q = QUOTES[Math.floor(Math.random() * QUOTES.length)];
      quoteText = '"' + q.quote + '"';
      quoteName = '- ' + q.name;
    }
  }

  // AI paddle collision
  if (ball.vx > 0 && ball.x + ball.r >= ai.x && ball.x - ball.r <= ai.x + ai.w &&
      ball.y >= ai.y - 4 && ball.y <= ai.y + ai.h + 4 && lastHitSide !== 'ai') {
    lastHitSide = 'ai';
    rallyCount++;
    const hitPos = (ball.y - ai.y) / ai.h - 0.5;
    ball.speed = Math.min(ball.speed + BALL_SPEED_INCREASE, BALL_SPEED_MAX);
    const angle = Math.PI - hitPos * 1.0;
    ball.vx = Math.cos(angle) * ball.speed;
    ball.vy = Math.sin(angle) * ball.speed;
    ball.x = ai.x - ball.r;
    spawnHitParticles(ball.x, ball.y, C.orange, 10);
    sfxHit(1.2);
    screenShake.intensity = 3;
  }

  // Score
  if (ball.x < -30) {
    ai.score++;
    spawnScoreExplosion(80, ball.y, C.orange);
    sfxScore();
    screenShake.intensity = 6;
    updateScoreUI();
    if (ai.score >= WIN_SCORE) return endGame();
    resetBall(1);
  }
  if (ball.x > W + 30) {
    player.score++;
    spawnScoreExplosion(W - 80, ball.y, C.teal);
    sfxScore();
    screenShake.intensity = 6;
    updateScoreUI();
    if (player.score >= WIN_SCORE) return endGame();
    resetBall(-1);
  }

  // Particles update
  particles = particles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    if (p.gravity) p.vy += p.gravity;
    p.vx *= 0.97;
    p.vy *= 0.97;
    p.life -= p.decay;
    return p.life > 0;
  });

  trails = trails.filter(t => { t.life -= 0.07; return t.life > 0; });

  // Floating items
  floatingItems.forEach(f => {
    f.x += f.vx;
    f.y += f.vy;
    f.rotation += f.rotSpeed;
    if (f.x < -30) f.x = W + 30;
    if (f.x > W + 30) f.x = -30;
    if (f.y < -30) f.y = H + 30;
    if (f.y > H + 30) f.y = -30;
  });

  // Screen shake decay
  if (screenShake.intensity > 0) {
    screenShake.x = (Math.random() - 0.5) * screenShake.intensity;
    screenShake.y = (Math.random() - 0.5) * screenShake.intensity;
    screenShake.intensity *= 0.85;
    if (screenShake.intensity < 0.2) screenShake.intensity = 0;
  }

  if (comboTimer > 0) comboTimer--;
}

// --- DRAW ---
function draw() {
  ctx.save();
  ctx.translate(screenShake.x, screenShake.y);

  // Background with subtle gradient
  const bgGrad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, W * 0.7);
  bgGrad.addColorStop(0, '#2d1b4e');
  bgGrad.addColorStop(1, '#1a0f2e');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Floating background emojis
  floatingItems.forEach(f => {
    ctx.save();
    ctx.globalAlpha = f.opacity;
    ctx.translate(f.x, f.y);
    ctx.rotate(f.rotation * Math.PI / 180);
    ctx.font = f.size + 'px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(f.emoji, 0, 0);
    ctx.restore();
  });

  // Playing field border
  ctx.strokeStyle = 'rgba(255, 215, 0, 0.08)';
  ctx.lineWidth = 1;
  ctx.strokeRect(20, 10, W - 40, H - 20);

  // Center dashed line
  ctx.setLineDash([6, 10]);
  ctx.strokeStyle = C.centerLine;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(W / 2, 15);
  ctx.lineTo(W / 2, H - 15);
  ctx.stroke();
  ctx.setLineDash([]);

  // Center easter egg
  ctx.save();
  ctx.globalAlpha = 0.08;
  ctx.font = '80px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🥚', W / 2, H / 2);
  ctx.restore();

  // Trails
  trails.forEach(t => {
    ctx.beginPath();
    ctx.arc(t.x, t.y, ball.r * t.life * 0.5, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 215, 0, ${t.life * 0.1})`;
    ctx.fill();
  });

  // Particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    if (p.type === 'emoji') {
      ctx.font = (p.size * p.life) + 'px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(p.emoji, p.x, p.y);
    } else {
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
    }
  });
  ctx.globalAlpha = 1;

  // Player paddle (Flyttgubbarna)
  drawPaddle(player, C.teal, '🏋️');

  // AI paddle (Kycklingarna)
  drawPaddle(ai, C.orange, '🐣');

  // Ball - Flyttkartong
  drawBallBox();

  // Team zone labels
  ctx.font = '700 10px Inter, system-ui';
  ctx.textAlign = 'center';
  ctx.letterSpacing = '1.5px';
  ctx.fillStyle = 'rgba(255, 107, 53, 0.25)';
  ctx.fillText('FLYTTGUBBARNA', W * 0.15, H - 12);
  ctx.fillStyle = 'rgba(255, 215, 0, 0.25)';
  ctx.fillText('KYCKLINGARNA', W * 0.85, H - 12);
  ctx.letterSpacing = '0px';

  // Combo text + quote
  if (comboTimer > 0) {
    const alpha = Math.min(1, comboTimer / 20);
    ctx.globalAlpha = alpha;
    ctx.textAlign = 'center';

    // Combo label
    ctx.font = '800 20px Inter, system-ui';
    ctx.fillStyle = C.teal;
    ctx.shadowColor = C.teal;
    ctx.shadowBlur = 15;
    ctx.fillText(comboText, W / 2, H / 2 - 55);
    ctx.shadowBlur = 0;

    // Quote
    if (quoteText) {
      ctx.font = '600 15px Inter, system-ui';
      ctx.fillStyle = '#FFD700';
      ctx.shadowColor = '#FFD700';
      ctx.shadowBlur = 8;
      ctx.fillText(quoteText, W / 2, H / 2 - 30);
      ctx.shadowBlur = 0;

      ctx.font = '700 12px Inter, system-ui';
      ctx.fillStyle = '#b8a9d4';
      ctx.fillText(quoteName, W / 2, H / 2 - 12);
    }

    ctx.globalAlpha = 1;
  }

  // Speed indicator (subtle)
  if (ball.speed > 5) {
    ctx.font = '600 10px Inter, system-ui';
    ctx.textAlign = 'center';
    ctx.fillStyle = `rgba(184, 169, 212, ${Math.min(1, (ball.speed - 5) / 3)})`;
    ctx.fillText(Math.round(ball.speed * 10) + ' km/h', W / 2, 30);
  }

  ctx.restore();
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

function drawPaddle(p, color, emoji) {
  // Glow aura
  const glowGrad = ctx.createRadialGradient(
    p.x + p.w / 2, p.y + p.h / 2, 0,
    p.x + p.w / 2, p.y + p.h / 2, p.h * 0.6
  );
  glowGrad.addColorStop(0, hexToRgba(color, 0.08));
  glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = glowGrad;
  ctx.fillRect(p.x - 30, p.y - 20, p.w + 60, p.h + 40);

  // Paddle body
  ctx.shadowColor = color;
  ctx.shadowBlur = 18;
  ctx.fillStyle = color;
  const r = p.w / 2;
  ctx.beginPath();
  ctx.roundRect(p.x, p.y, p.w, p.h, r);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Inner highlight
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.beginPath();
  ctx.roundRect(p.x + 2, p.y + 4, 4, p.h - 8, 2);
  ctx.fill();

  // Emoji above paddle
  ctx.font = '22px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(emoji, p.x + p.w / 2, p.y - 16);
}

function drawBallBox() {
  const x = ball.x, y = ball.y, r = ball.r;

  // Bright glow circle behind the box
  const glowGrad = ctx.createRadialGradient(x, y, 0, x, y, r * 2);
  glowGrad.addColorStop(0, 'rgba(255, 215, 0, 0.25)');
  glowGrad.addColorStop(0.5, 'rgba(255, 215, 0, 0.08)');
  glowGrad.addColorStop(1, 'rgba(255, 215, 0, 0)');
  ctx.fillStyle = glowGrad;
  ctx.beginPath();
  ctx.arc(x, y, r * 2, 0, Math.PI * 2);
  ctx.fill();

  // Glow
  ctx.shadowColor = '#FFD700';
  ctx.shadowBlur = 25;

  // Draw box emoji - bigger
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(ball.rotation * Math.PI / 180);
  ctx.font = (r * 2.5) + 'px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('📦', 0, 0);
  ctx.restore();
  ctx.shadowBlur = 0;

  // Motion lines when fast
  if (ball.speed > 5) {
    const alpha = Math.min(0.4, (ball.speed - 5) / 6);
    ctx.strokeStyle = `rgba(255, 215, 0, ${alpha})`;
    ctx.lineWidth = 1.5;
    const dir = ball.vx > 0 ? -1 : 1;
    for (let i = 0; i < 3; i++) {
      const offset = (i + 1) * 8;
      const len = 8 + i * 4;
      ctx.beginPath();
      ctx.moveTo(x + dir * (r + offset), y - 6 + i * 6);
      ctx.lineTo(x + dir * (r + offset + len), y - 6 + i * 6);
      ctx.stroke();
    }
  }
}


function updateScoreUI() {
  document.getElementById('score-left').textContent = player.score;
  document.getElementById('score-right').textContent = ai.score;
}

const WIN_LINES = [
  'Flyttgubbarna bar hem segern! 📦💪',
  'Alla kartonger pa plats. Glad pask!',
  'Gubbarna lyfte tungt idag! 🏋️',
];
const LOSE_LINES = [
  'Kycklingarna hackade sig till vinst! 🐣',
  'Pip pip, kycklingarna tog hem det!',
  'Fjaderfana var for snabba idag! 🐔',
];

function endGame() {
  gameRunning = false;
  cancelAnimationFrame(animId);
  stopMusic();

  const won = player.score >= WIN_SCORE;
  sfxGameOver(won);
  document.getElementById('result-text').textContent = won ? '🏋️ Flyttgubbarna vinner!' : '🐣 Kycklingarna vinner!';
  const scoreEl = document.getElementById('result-score');
  scoreEl.textContent = `${player.score} - ${ai.score}`;
  scoreEl.style.color = won ? C.teal : C.orange;
  const lines = won ? WIN_LINES : LOSE_LINES;
  document.getElementById('result-flavor').textContent = lines[Math.floor(Math.random() * lines.length)];
  document.getElementById('score-display').style.display = 'none';
  document.getElementById('game-over-screen').style.display = 'flex';
}

function gameLoop() {
  update();
  draw();
  if (gameRunning) animId = requestAnimationFrame(gameLoop);
}

function startGame() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('game-over-screen').style.display = 'none';
  document.getElementById('score-display').style.display = 'flex';

  initObjects();
  updateScoreUI();
  resize();
  gameRunning = true;
  startMusic();
  gameLoop();
}

// Init
resize();
window.addEventListener('resize', resize);
ctx.fillStyle = '#1a0f2e';
ctx.fillRect(0, 0, W, H);
</script>
