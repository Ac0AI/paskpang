<title>Påskpång</title>
<style>

    background: #1a0f2e;

    flex-direction: column;
    align-items: center;
    justify-content: center;

  }

    height: 100%;
    border-radius: 16px;
    display: block;
  }

    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;

    z-index: 10;
    gap: 18px;
    padding: 30px;
    text-align: center;

    font-size: clamp(28px, 5vw, 52px);
    font-weight: 900;
    background: linear-gradient(135deg, #FFD700, #FF6B35);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
  }

  .subtitle {
    font-size: clamp(13px, 2.2vw, 18px);
    color: #b8a9d4;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

    display: flex;
    align-items: center;
    gap: 24px;
    margin: 10px 0;
  }

  .team {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

    height: 64px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;

    font-weight: 700;
    color: #faf9f6;
  }

  .vs {
    font-size: 24px;
    font-weight: 900;
    color: #e85a1c;
  }

    border-radius: 12px;
    font-family: inherit;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;

    letter-spacing: 0.5px;

    color: #5a5a5a;
    margin-top: 2px;
  }

    top: 14px;

    align-items: center;

// --- CHIPTUNE AUDIO ---
let audioCtx = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playNote(freq, duration, time, vol = 0.08, type = 'square') {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, time);
  gain.gain.exponentialRampToValueAtTime(0.001, time + duration * 0.9);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(time);
  osc.stop(time + duration);
}

// Demoscene-style arpeggio helper
function playArp(baseFreq, time, vol, speed) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'square';
  // Rapid arpeggio: root -> major third -> fifth -> octave
  const freqs = [baseFreq, baseFreq * 1.25, baseFreq * 1.5, baseFreq * 2];
  const stepDur = speed || 0.04;
  osc.frequency.setValueAtTime(freqs[0], time);
  osc.frequency.setValueAtTime(freqs[1], time + stepDur);
  osc.frequency.setValueAtTime(freqs[2], time + stepDur * 2);
  osc.frequency.setValueAtTime(freqs[3], time + stepDur * 3);
  osc.frequency.setValueAtTime(freqs[0], time + stepDur * 4);
  osc.frequency.setValueAtTime(freqs[1], time + stepDur * 5);
  gain.gain.setValueAtTime(vol, time);
  gain.gain.exponentialRampToValueAtTime(0.001, time + stepDur * 6);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(time);
  osc.stop(time + stepDur * 6);
}

// Demoscene-style vibrato lead
function playVibratoNote(freq, duration, time, vol) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const lfo = audioCtx.createOscillator();
  const lfoGain = audioCtx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.value = freq;
  lfo.type = 'sine';
  lfo.frequency.value = 6; // vibrato rate
  lfoGain.gain.value = freq * 0.015; // vibrato depth
  lfo.connect(lfoGain);
  lfoGain.connect(osc.frequency);
  gain.gain.setValueAtTime(0, time);
  gain.gain.linearRampToValueAtTime(vol, time + 0.02);
  gain.gain.setValueAtTime(vol * 0.8, time + duration * 0.5);
  gain.gain.exponentialRampToValueAtTime(0.001, time + duration * 0.95);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(time);
  osc.stop(time + duration);
  lfo.start(time);
  lfo.stop(time + duration);
}

  if (!audioCtx || !musicPlaying) return;
  const now = audioCtx.currentTime;
  const rows = LEAD.length;

  for (let i = 0; i < rows; i++) {
    const t = now + i * ROW_TIME;

    // Lead melody
    if (LEAD[i] > 0) {
      playVibratoNote(LEAD[i], ROW_TIME * 1.8, t, 0.045);
    }

    // Arpeggios (every 2 rows for breathing room)
    if (i % 2 === 0 && ARP_ROOTS[i] > 0) {
      playArp(ARP_ROOTS[i] * 2, t, 0.025, 0.035);
    }

    // Bass
    if (BASS_PAT[i] > 0) {
      playNote(BASS_PAT[i], ROW_TIME * 0.8, t, 0.06, 'triangle');
    }

    // Drums
    if (i % 4 === 0) {
      // Kick
      const kickOsc = audioCtx.createOscillator();
      const kickGain = audioCtx.createGain();
      kickOsc.type = 'sine';
      kickOsc.frequency.setValueAtTime(150, t);
      kickOsc.frequency.exponentialRampToValueAtTime(40, t + 0.1);
      kickGain.gain.setValueAtTime(0.12, t);
      kickGain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
      kickOsc.connect(kickGain);
      kickGain.connect(audioCtx.destination);
      kickOsc.start(t);
      kickOsc.stop(t + 0.15);
    }
    if (i % 4 === 2) {
      // Snare (noise-like)
      playNote(180, 0.06, t, 0.04, 'square');
      playNote(330, 0.04, t, 0.03, 'sawtooth');
    }
    if (i % 2 === 1) {
      // Hihat
      playNote(1200, 0.015, t, 0.015, 'sawtooth');
    }
    // Open hihat on offbeats
    if (i % 8 === 3 || i % 8 === 7) {
      playNote(900, 0.04, t, 0.02, 'sawtooth');
    }
  }

  // Loop
  const loopMs = rows * ROW_TIME * 1000;
  musicTimeout = setTimeout(() => {
    if (musicPlaying) playMusic();
  }, loopMs - 80);
}

function startMusic() {
  initAudio();
  musicPlaying = true;
  playMusic();
}

function stopMusic() {
  musicPlaying = false;
  if (musicTimeout) {
    clearTimeout(musicTimeout);
    musicTimeout = null;
  }
}

// Sound effects
function sfxHit(pitch = 1) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  playNote(440 * pitch, 0.08, t, 0.12, 'square');
  playNote(660 * pitch, 0.06, t + 0.02, 0.08, 'square');
}

function sfxScore() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  playNote(523, 0.1, t, 0.1, 'square');
  playNote(659, 0.1, t + 0.1, 0.1, 'square');
  playNote(784, 0.15, t + 0.2, 0.1, 'square');
}

function sfxBounce() {
  if (!audioCtx) return;
  playNote(220, 0.05, audioCtx.currentTime, 0.06, 'triangle');
}

function sfxGameOver(won) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  if (won) {
    playNote(523, 0.15, t, 0.1, 'square');
    playNote(659, 0.15, t + 0.15, 0.1, 'square');
    playNote(784, 0.15, t + 0.3, 0.1, 'square');
    playNote(1047, 0.3, t + 0.45, 0.12, 'square');
  } else {
    playNote(392, 0.2, t, 0.1, 'square');
    playNote(330, 0.2, t + 0.2, 0.1, 'square');
    playNote(294, 0.2, t + 0.4, 0.1, 'square');
    playNote(262, 0.4, t + 0.6, 0.08, 'sawtooth');
  }
}

// Input
let keys = {};

document.addEventListener('keydown', e => { keys[e.key] = true; });
document.addEventListener('keyup', e => { keys[e.key] = false; });


// --- UPDATE ---
function update() {
  // Player movement - arrow keys only
  const pSpeed = 8;
  if (keys['ArrowUp'] || keys['w']) player.y -= pSpeed;
  if (keys['ArrowDown'] || keys['s']) player.y += pSpeed;
  player.y = Math.max(0, Math.min(H - player.h, player.y));

  // AI movement - intentionally beatable
  const aiTarget = ball.y - ai.h / 2;
  // AI only reacts when ball is heading toward it, and with delay
  let aiSpeed = AI_BASE_SPEED;
  if (ball.vx < 0) {
    // Ball going away - AI drifts slowly toward center
    const centerDiff = (H / 2 - ai.h / 2) - ai.y;
    ai.y += Math.sign(centerDiff) * Math.min(Math.abs(centerDiff), 1);
  } else {
    // Ball coming - react but with imperfection
    const imperfection = Math.sin(Date.now() * 0.003) * 15; // wobble
    const adjustedTarget = aiTarget + imperfection;
    const adjustedDiff = adjustedTarget - ai.y;
    if (Math.abs(adjustedDiff) > 8) {
      ai.y += Math.sign(adjustedDiff) * Math.min(Math.abs(adjustedDiff) * AI_REACTION_DELAY, aiSpeed);
    }
  }
  ai.y = Math.max(0, Math.min(H - ai.h, ai.y));

  // Ball trail
  if (ball.speed > 4) {
    trails.push({ x: ball.x, y: ball.y, life: 1 });
  }

  // Ball movement
  ball.x += ball.vx;
  ball.y += ball.vy;
  ball.rotation += ball.speed * 2;

  // Top/bottom bounce
  if (ball.y - ball.r <= 0) {
    ball.y = ball.r;
    ball.vy = Math.abs(ball.vy);
    spawnHitParticles(ball.x, ball.y, C.bronze, 4);
    sfxBounce();
  }
  if (ball.y + ball.r >= H) {
    ball.y = H - ball.r;
    ball.vy = -Math.abs(ball.vy);
    spawnHitParticles(ball.x, ball.y, C.bronze, 4);
    sfxBounce();
  }

  // Player paddle collision (with tunneling protection)
  if (ball.vx < 0 && ball.x - ball.r <= player.x + player.w && ball.x >= player.x - ball.r &&
      ball.y >= player.y - 6 && ball.y <= player.y + player.h + 6 && lastHitSide !== 'player') {
    lastHitSide = 'player';
    rallyCount++;
    const hitPos = (ball.y - player.y) / player.h - 0.5;
    ball.speed = Math.min(ball.speed + BALL_SPEED_INCREASE, BALL_SPEED_MAX);
    const angle = hitPos * 1.0; // less extreme angles
    ball.vx = Math.cos(angle) * ball.speed;
    ball.vy = Math.sin(angle) * ball.speed;
    ball.x = player.x + player.w + ball.r;
    spawnHitParticles(ball.x, ball.y, C.teal, 10);
    sfxHit(1);
    screenShake.intensity = 3;
    if (rallyCount >= 3) {
      comboText = rallyCount >= 5 ? 'Rally x' + rallyCount + '!' : 'Bra retur!';
      comboTimer = rallyCount >= 5 ? 120 : 90;
      const q = QUOTES[Math.floor(Math.random() * QUOTES.length)];
      quoteText = '"' + q.quote + '"';
      quoteName = '- ' + q.name;
    }
  }

  // AI paddle collision (with tunneling protection)
  if (ball.vx > 0 && ball.x + ball.r >= ai.x && ball.x <= ai.x + ai.w + ball.r &&
      ball.y >= ai.y - 6 && ball.y <= ai.y + ai.h + 6 && lastHitSide !== 'ai') {
    lastHitSide = 'ai';
    rallyCount++;
    const hitPos = (ball.y - ai.y) / ai.h - 0.5;
    ball.speed = Math.min(ball.speed + BALL_SPEED_INCREASE, BALL_SPEED_MAX);
    const angle = Math.PI - hitPos * 1.0;
    ball.vx = Math.cos(angle) * ball.speed;
    ball.vy = Math.sin(angle) * ball.speed;
    ball.x = ai.x - ball.r;
    spawnHitParticles(ball.x, ball.y, C.orange, 10);
    sfxHit(1.2);
    screenShake.intensity = 3;
  }

  // Score - trigger when ball center passes edge
  if (ball.x < -ball.r) {
    ai.score++;
    spawnScoreExplosion(80, ball.y, C.orange);
    sfxScore();
    screenShake.intensity = 6;
    updateScoreUI();
    if (ai.score >= WIN_SCORE) return endGame();
    resetBall(1);
  }
  if (ball.x > W + ball.r) {
    player.score++;
    spawnScoreExplosion(W - 80, ball.y, C.teal);
    sfxScore();
    screenShake.intensity = 6;
    updateScoreUI();
    if (player.score >= WIN_SCORE) return endGame();
    resetBall(-1);
  }

  // Particles update
  particles = particles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    if (p.gravity) p.vy += p.gravity;
    p.vx *= 0.97;
    p.vy *= 0.97;
    p.life -= p.decay;
    return p.life > 0;
  });

  trails = trails.filter(t => { t.life -= 0.07; return t.life > 0; });

  // Floating items
  floatingItems.forEach(f => {
    f.x += f.vx;
    f.y += f.vy;
    f.rotation += f.rotSpeed;
    if (f.x < -30) f.x = W + 30;
    if (f.x > W + 30) f.x = -30;
    if (f.y < -30) f.y = H + 30;
    if (f.y > H + 30) f.y = -30;
  });

  // Screen shake decay
  if (screenShake.intensity > 0) {
    screenShake.x = (Math.random() - 0.5) * screenShake.intensity;
    screenShake.y = (Math.random() - 0.5) * screenShake.intensity;
    screenShake.intensity *= 0.85;
    if (screenShake.intensity < 0.2) screenShake.intensity = 0;
  }

  if (comboTimer > 0) comboTimer--;
}

// --- DRAW ---
function draw() {
  ctx.save();
  ctx.translate(screenShake.x, screenShake.y);

  // Background with subtle gradient
  const bgGrad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, W * 0.7);
  bgGrad.addColorStop(0, '#2d1b4e');
  bgGrad.addColorStop(1, '#1a0f2e');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Floating background emojis
  floatingItems.forEach(f => {
    ctx.save();
    ctx.globalAlpha = f.opacity;
    ctx.translate(f.x, f.y);
    ctx.rotate(f.rotation * Math.PI / 180);
    ctx.font = f.size + 'px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(f.emoji, 0, 0);
    ctx.restore();
  });

  // Playing field border
  ctx.strokeStyle = 'rgba(255, 215, 0, 0.08)';
  ctx.lineWidth = 1;
  ctx.strokeRect(20, 10, W - 40, H - 20);

  // Center dashed line
  ctx.setLineDash([6, 10]);
  ctx.strokeStyle = C.centerLine;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(W / 2, 15);
  ctx.lineTo(W / 2, H - 15);
  ctx.stroke();
  ctx.setLineDash([]);

  // Center easter egg
  ctx.save();
  ctx.globalAlpha = 0.08;
  ctx.font = '80px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🥚', W / 2, H / 2);
  ctx.restore();

  // Trails
  trails.forEach(t => {
    ctx.beginPath();
    ctx.arc(t.x, t.y, ball.r * t.life * 0.5, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 215, 0, ${t.life * 0.1})`;
    ctx.fill();
  });

  // Particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    if (p.type === 'emoji') {
      ctx.font = (p.size * p.life) + 'px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(p.emoji, p.x, p.y);
    } else {
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
    }
  });
  ctx.globalAlpha = 1;

  // Player paddle (Flyttgubbarna)
  drawPaddle(player, C.teal, '🏋️');

  // AI paddle (Kycklingarna)
  drawPaddle(ai, C.orange, '🐣');

  // Ball - Flyttkartong
  drawBallBox();

  // Team zone labels
  ctx.font = '700 10px Inter, system-ui';
  ctx.textAlign = 'center';
  ctx.letterSpacing = '1.5px';
  ctx.fillStyle = 'rgba(255, 107, 53, 0.25)';
  ctx.fillText('FLYTTGUBBARNA', W * 0.15, H - 12);
  ctx.fillStyle = 'rgba(255, 215, 0, 0.25)';
  ctx.fillText('KYCKLINGARNA', W * 0.85, H - 12);
  ctx.letterSpacing = '0px';

  // Combo text + quote
  if (comboTimer > 0) {
    const alpha = Math.min(1, comboTimer / 20);
    ctx.globalAlpha = alpha;
    ctx.textAlign = 'center';

    // Combo label
    ctx.font = '800 20px Inter, system-ui';
    ctx.fillStyle = C.teal;
    ctx.shadowColor = C.teal;
    ctx.shadowBlur = 15;
    ctx.fillText(comboText, W / 2, H / 2 - 55);
    ctx.shadowBlur = 0;

    // Quote
    if (quoteText) {
      ctx.font = '600 15px Inter, system-ui';
      ctx.fillStyle = '#FFD700';
      ctx.shadowColor = '#FFD700';
      ctx.shadowBlur = 8;
      ctx.fillText(quoteText, W / 2, H / 2 - 30);
      ctx.shadowBlur = 0;

      ctx.font = '700 12px Inter, system-ui';
      ctx.fillStyle = '#b8a9d4';
      ctx.fillText(quoteName, W / 2, H / 2 - 12);
    }

    ctx.globalAlpha = 1;
  }

  // Speed indicator (subtle)
  if (ball.speed > 5) {
    ctx.font = '600 10px Inter, system-ui';
    ctx.textAlign = 'center';
    ctx.fillStyle = `rgba(184, 169, 212, ${Math.min(1, (ball.speed - 5) / 3)})`;
    ctx.fillText(Math.round(ball.speed * 10) + ' km/h', W / 2, 30);
  }

  ctx.restore();
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

function drawPaddle(p, color, emoji) {
  // Glow aura
  const glowGrad = ctx.createRadialGradient(
    p.x + p.w / 2, p.y + p.h / 2, 0,
    p.x + p.w / 2, p.y + p.h / 2, p.h * 0.6
  );
  glowGrad.addColorStop(0, hexToRgba(color, 0.08));
  glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = glowGrad;
  ctx.fillRect(p.x - 30, p.y - 20, p.w + 60, p.h + 40);

  // Paddle body
  ctx.shadowColor = color;
  ctx.shadowBlur = 18;
  ctx.fillStyle = color;
  const r = p.w / 2;
  ctx.beginPath();
  ctx.roundRect(p.x, p.y, p.w, p.h, r);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Inner highlight
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.beginPath();
  ctx.roundRect(p.x + 2, p.y + 4, 4, p.h - 8, 2);
  ctx.fill();

  // Emoji above paddle
  ctx.font = '22px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(emoji, p.x + p.w / 2, p.y - 16);
}

function drawBallBox() {
  const x = ball.x, y = ball.y, r = ball.r;

  // Bright glow circle behind the box
  const glowGrad = ctx.createRadialGradient(x, y, 0, x, y, r * 2);
  glowGrad.addColorStop(0, 'rgba(255, 215, 0, 0.25)');
  glowGrad.addColorStop(0.5, 'rgba(255, 215, 0, 0.08)');
  glowGrad.addColorStop(1, 'rgba(255, 215, 0, 0)');
  ctx.fillStyle = glowGrad;
  ctx.beginPath();
  ctx.arc(x, y, r * 2, 0, Math.PI * 2);
  ctx.fill();

  // Glow
  ctx.shadowColor = '#FFD700';
  ctx.shadowBlur = 25;

  // Draw box emoji - bigger
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(ball.rotation * Math.PI / 180);
  ctx.font = (r * 2.5) + 'px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('📦', 0, 0);
  ctx.restore();
  ctx.shadowBlur = 0;

  // Motion lines when fast
  if (ball.speed > 5) {
    const alpha = Math.min(0.4, (ball.speed - 5) / 6);
    ctx.strokeStyle = `rgba(255, 215, 0, ${alpha})`;
    ctx.lineWidth = 1.5;
    const dir = ball.vx > 0 ? -1 : 1;
    for (let i = 0; i < 3; i++) {
      const offset = (i + 1) * 8;
      const len = 8 + i * 4;
      ctx.beginPath();
      ctx.moveTo(x + dir * (r + offset), y - 6 + i * 6);
      ctx.lineTo(x + dir * (r + offset + len), y - 6 + i * 6);
      ctx.stroke();
    }
  }
}


function updateScoreUI() {
  document.getElementById('score-left').textContent = player.score;
  document.getElementById('score-right').textContent = ai.score;
}

const WIN_LINES = [
  'Flyttgubbarna bar hem segern! 📦💪',
  'Alla kartonger pa plats. Glad pask!',
  'Gubbarna lyfte tungt idag! 🏋️',
];
const LOSE_LINES = [
  'Kycklingarna hackade sig till vinst! 🐣',
  'Pip pip, kycklingarna tog hem det!',
  'Fjaderfana var for snabba idag! 🐔',
];

function endGame() {
  gameRunning = false;
  cancelAnimationFrame(animId);
  stopMusic();

  const won = player.score >= WIN_SCORE;
  sfxGameOver(won);
  document.getElementById('result-text').textContent = won ? '🏋️ Flyttgubbarna vinner!' : '🐣 Kycklingarna vinner!';
  const scoreEl = document.getElementById('result-score');
  scoreEl.textContent = `${player.score} - ${ai.score}`;
  scoreEl.style.color = won ? C.teal : C.orange;
  const lines = won ? WIN_LINES : LOSE_LINES;
  document.getElementById('result-flavor').textContent = lines[Math.floor(Math.random() * lines.length)];
  document.getElementById('score-display').style.display = 'none';
  document.getElementById('game-over-screen').style.display = 'flex';
}

function gameLoop() {
  update();
  draw();
  if (gameRunning) animId = requestAnimationFrame(gameLoop);
}

function startGame() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('game-over-screen').style.display = 'none';
  document.getElementById('score-display').style.display = 'flex';

  initObjects();
  updateScoreUI();
  resize();
  gameRunning = true;
  startMusic();
  gameLoop();
}

// Init
resize();
window.addEventListener('resize', resize);
ctx.fillStyle = '#1a0f2e';
ctx.fillRect(0, 0, W, H);
</script>
